services:
  web:
    container_name: web-server-admin-web
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - 80:80
    depends_on:
      - app
    volumes:
      - ./web-admin/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web-admin/site1:/usr/share/nginx/html/site1:ro
      - ./web-admin/site3:/var/www/html:ro

  app:
    container_name: web-server-admin-app
    build: .
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9000"
    volumes:
      - ./web-admin/site3:/var/www/html

  db:
    image: postgres:16-alpine
    container_name: web-server-admin-db
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./web-admin/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      retries: 3

volumes:
  pgdata:
